<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standards-Based Grade Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // Set the theme before the page paints to avoid a flash of the wrong
        // colors. Uses the saved choice, falling back to the OS preference.
        (function () {
            try {
                var saved = localStorage.getItem('theme');
                var theme = saved
                    || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {}
        })();
    </script>
    <style>
        /* Theme palettes. Light is the default; the dark overrides apply when
           <html data-theme="dark">. Every color below references one of these
           variables, so the two themes stay in sync from one place. */
        :root {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --heading: #1e1b4b;
            --text: #374151;
            --muted: #6b6b6b;
            --muted-soft: #6b7280;
            --accent: #4f46e5;
            --track: #e5e7eb;
            --divider: #e5e7eb;
            --list-border: #f3f4f6;
            --result-bg: #f3f4f6;
            --result-text: #4b5563;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.08), 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        :root[data-theme="dark"] {
            --bg: #18181b;
            --surface: #26262b;
            --heading: #ececf1;
            --text: #d4d4d8;
            --muted: #a1a1aa;
            --muted-soft: #9ca3af;
            --accent: #818cf8;
            --track: #3f3f46;
            --divider: #3f3f46;
            --list-border: #2f2f35;
            --result-bg: #2a2a30;
            --result-text: #d4d4d8;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.5), 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .calculator {
            position: relative;
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 680px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--divider);
            background: var(--bg);
            color: var(--text);
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
        }

        .theme-toggle:hover { transform: scale(1.08); }

        .theme-toggle:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 3px;
        }

        h1 {
            text-align: center;
            color: var(--heading);
            margin: 0 0 6px 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            padding: 0 44px;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin: 0 0 36px 0;
        }

        .input-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }

        .slider-container {
            position: relative;
            margin: 4px 0;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--track);
            outline: none;
            -webkit-appearance: none;
            margin: 12px 0 6px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.45);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.55);
        }

        input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.45);
        }

        input[type="range"]:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 4px;
            border-radius: 3px;
        }

        .hashmarks {
            position: relative;
            height: 28px;
            margin-top: 2px;
        }

        .hashmark {
            position: absolute;
            transform: translateX(-50%);
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            font-weight: 500;
        }

        .hashmark::before {
            content: '|';
            display: block;
            color: var(--muted);
            font-size: 10px;
            margin-bottom: 2px;
        }

        .slider-readout {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            margin-top: 6px;
            gap: 4px;
        }

        .slider-readout-label {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }

        .slider-value {
            font-weight: 700;
            color: var(--accent);
            font-size: 20px;
            min-width: 48px;
            text-align: right;
        }

        .result {
            text-align: center;
            margin-top: 8px;
            padding: 28px 20px;
            border-radius: 14px;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: var(--result-bg);
            color: var(--result-text);
            transition: background 0.35s ease, color 0.35s ease;
        }

        .grade-A { background: linear-gradient(135deg, #047857, #059669); color: #fff; }
        .grade-B { background: linear-gradient(135deg, #2563eb, #3b82f6); color: #fff; }
        .grade-C { background: linear-gradient(135deg, #9333ea, #c026d3); color: #fff; }
        .grade-D { background: linear-gradient(135deg, #c2410c, #ea580c); color: #fff; }
        .grade-F { background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; }

        .grade-breakdown {
            margin-top: 14px;
            padding: 14px 0 0;
            font-size: 14px;
            line-height: 1.7;
            color: var(--muted-soft);
        }

        .grade-breakdown strong {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .section-divider {
            height: 1px;
            background: var(--divider);
            margin: 32px 0;
        }

        .rules-columns {
            display: flex;
            gap: 40px;
        }

        .rules-columns > div {
            flex: 1;
            min-width: 0;
        }

        /* In the two-column layout the rules sit side by side, so drop the
           top margin the exam rules used when stacked below the scale. */
        .rules-columns .final-exam-rules {
            margin-top: 0;
        }

        @media (max-width: 620px) {
            .rules-columns {
                flex-direction: column;
                gap: 28px;
            }
        }

        .grading-scale {
            padding: 0;
        }

        .grading-scale h3 {
            margin: 0 0 12px 0;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .grading-scale ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .grading-scale li {
            padding: 9px 0;
            border-bottom: 1px solid var(--list-border);
            font-size: 14px;
            color: var(--text);
        }

        .grading-scale li:last-child {
            border-bottom: none;
        }

        .grading-scale .grade-subrules {
            margin: 6px 0 2px 16px;
            list-style: disc;
            font-size: 13px;
            color: var(--muted-soft);
        }

        .grading-scale .grade-subrules li {
            padding: 2px 0;
            border-bottom: none;
            font-size: 13px;
            color: var(--muted-soft);
        }

        .final-exam-rules {
            margin-top: 28px;
            padding: 0;
        }

        .final-exam-rules h4 {
            margin: 0 0 12px 0;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .final-exam-rules ul {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .final-exam-rules li {
            padding: 7px 0;
            color: var(--muted-soft);
            font-size: 14px;
            border-bottom: 1px solid var(--list-border);
            display: flex;
            gap: 8px;
        }

        .final-exam-rules li:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .final-exam-rules li strong {
            min-width: 118px;
            color: var(--text);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
        <h1>Standards-Based Grade Calculator</h1>
        <p class="subtitle">Adjust the sliders below to see your projected final grade</p>

        <div class="input-group">
            <label for="coreTargets">CORE Learning Targets mastered (out of 10)</label>
            <div class="slider-container">
                <input type="range" id="coreTargets" min="0" max="10" value="0" oninput="calculateGrade()">
                <div class="hashmarks" id="coreHashmarks"></div>
            </div>
            <div class="slider-readout">
                <span class="slider-readout-label">CORE LT =&nbsp;</span>
                <span class="slider-value" id="coreValue">0</span>
            </div>
        </div>

        <div class="input-group">
            <label for="otherTargets">OTHER Learning Targets mastered (out of 6)</label>
            <div class="slider-container">
                <input type="range" id="otherTargets" min="0" max="6" value="0" oninput="calculateGrade()">
                <div class="hashmarks" id="otherHashmarks"></div>
            </div>
            <div class="slider-readout">
                <span class="slider-readout-label">OTHER LT =&nbsp;</span>
                <span class="slider-value" id="otherValue">0</span>
            </div>
        </div>

        <div class="input-group">
            <label for="finalExam">Final Exam Score</label>
            <div class="slider-container">
                <input type="range" id="finalExam" min="0" max="100" value="0" oninput="calculateGrade()">
                <div class="hashmarks" id="finalHashmarks"></div>
            </div>
            <div class="slider-readout">
                <span class="slider-readout-label">Score =&nbsp;</span>
                <span class="slider-value" id="finalValue">0%</span>
            </div>
        </div>

        <div id="result" class="result" aria-live="polite" aria-atomic="true">Enter your scores above</div>

        <div id="gradeBreakdown" class="grade-breakdown" style="display: none;">
            <strong>Grade Calculation</strong>
            <span id="initialGradeText"></span><br>
            <span id="finalExamImpact"></span>
        </div>

        <div class="section-divider"></div>

        <div class="rules-columns">
            <div class="grading-scale">
                <h3>Standards-Based Grading Scale</h3>
                <ul id="gradingScaleList"></ul>
            </div>

            <div class="final-exam-rules">
                <h4>Final Exam Impact Rules</h4>
                <ul id="finalExamRulesList"></ul>
            </div>
        </div>
    </div>

    <script>
        // ===================================================================
        //  Grading rules — the single source of truth.
        //  Both the calculation AND the rule lists shown on the page are
        //  generated from the two tables below, so they can never drift apart.
        // ===================================================================

        // Letter-grade ladder, lowest to highest. Used to nudge a grade up or
        // down for the final-exam adjustment. The display order (A→F) and the
        // CSS class names (grade-A … grade-F) both derive from this.
        const GRADE_LADDER = ['F', 'D', 'C', 'B', 'A'];
        const GRADE_DISPLAY_ORDER = [...GRADE_LADDER].reverse();

        // Base grade from mastered Learning Targets. Rules are checked top to
        // bottom; the first match wins. `core`/`other` are the values that
        // qualify; 'any' matches anything (used for the F fallback row).
        const BASE_GRADE_RULES = [
            { grade: 'A', core: 10,    other: [4, 5, 6] },
            { grade: 'B', core: 10,    other: [2, 3] },
            { grade: 'C', core: 10,    other: [0, 1] },
            { grade: 'C', core: 9,     other: [4, 5, 6] },
            { grade: 'D', core: 9,     other: [0, 1, 2, 3] },
            { grade: 'C', core: 8,     other: [5, 6] },
            { grade: 'D', core: 8,     other: [0, 1, 2, 3, 4] },
            { grade: 'F', core: 'any', other: 'any' },
        ];

        // Final-exam impact. Checked high to low; first row whose `min` the
        // score meets supplies the adjustment (in letter grades).
        const EXAM_RULES = [
            { min: 90, delta:  3 },
            { min: 80, delta:  2 },
            { min: 70, delta:  1 },
            { min: 60, delta:  0 },
            { min: 50, delta: -1 },
            { min: 40, delta: -2 },
            { min:  0, delta: -3 },
        ];

        // CORE count below which the grade is F (derived from the rules above,
        // so it stays correct if the thresholds change).
        const F_THRESHOLD = Math.min(
            ...BASE_GRADE_RULES.filter(r => typeof r.core === 'number').map(r => r.core)
        ) - 1;

        // ---- Calculation -------------------------------------------------

        function calculateStandardsGrade(core, other) {
            const rule = BASE_GRADE_RULES.find(r =>
                (r.core === 'any' || r.core === core) &&
                (r.other === 'any' || r.other.includes(other))
            );
            return rule ? rule.grade : 'F';
        }

        function examAdjustment(score) {
            const rule = EXAM_RULES.find(r => score >= r.min);
            return rule ? rule.delta : 0;
        }

        function adjustGrade(grade, delta) {
            const i = GRADE_LADDER.indexOf(grade) + delta;
            const clamped = Math.max(0, Math.min(GRADE_LADDER.length - 1, i));
            return GRADE_LADDER[clamped];
        }

        // ---- Phrasing helpers (shared by the generated rule lists) -------

        // [4, 5, 6] -> "4, 5, or 6";  [2, 3] -> "2 or 3";  [1] -> "1"
        function listPhrase(nums) {
            if (nums.length === 1) return `${nums[0]}`;
            if (nums.length === 2) return `${nums[0]} or ${nums[1]}`;
            return `${nums.slice(0, -1).join(', ')}, or ${nums[nums.length - 1]}`;
        }

        function baseRulePhrase(rule) {
            if (rule.core === 'any') return `${F_THRESHOLD} or fewer CORE`;
            return `${rule.core} CORE + ${listPhrase(rule.other)} OTHER`;
        }

        function examRangePhrase(rule, index) {
            if (index === 0) return `${rule.min}% or higher`;
            const upper = EXAM_RULES[index - 1].min;
            if (rule.min === 0) return `Below ${upper}%`;
            return `${rule.min}–${upper - 0.01}%`;
        }

        function examDeltaPhrase(delta) {
            const n = Math.abs(delta);
            const grades = `${n} letter grade${n > 1 ? 's' : ''}`;
            if (delta > 0) return `Grade improves by up to ${grades}`;
            if (delta < 0) return `Grade drops by up to ${grades}`;
            return 'No change to grade';
        }

        // ---- Rendering ---------------------------------------------------

        // Place tick marks under a slider. Pass `marks` as a list of
        // { value, label } to mark specific values; omit it to mark every
        // integer from the slider's min to its max.
        function createHashmarks(sliderId, containerId, marks) {
            const slider = document.getElementById(sliderId);
            const min = parseInt(slider.min, 10);
            const max = parseInt(slider.max, 10);
            const container = document.getElementById(containerId);
            if (!marks) {
                marks = [];
                for (let v = min; v <= max; v++) marks.push({ value: v, label: v });
            }
            for (const { value, label } of marks) {
                const hashmark = document.createElement('div');
                hashmark.className = 'hashmark';
                hashmark.textContent = label;
                // Center each mark on the slider thumb's center, which travels
                // from 11px (half the 22px thumb) to (width - 11px).
                const fraction = (value - min) / (max - min);
                hashmark.style.left = `calc(11px + (100% - 22px) * ${fraction})`;
                container.appendChild(hashmark);
            }
        }

        function renderGradingScale() {
            const ul = document.getElementById('gradingScaleList');
            for (const grade of GRADE_DISPLAY_ORDER) {
                const rules = BASE_GRADE_RULES.filter(r => r.grade === grade);
                const li = document.createElement('li');
                if (rules.length === 1) {
                    li.innerHTML = `<strong>${grade}:</strong> ${baseRulePhrase(rules[0])}`;
                } else {
                    const items = rules.map(r => `<li>${baseRulePhrase(r)}</li>`).join('');
                    li.innerHTML = `<strong>${grade}:</strong><ul class="grade-subrules">${items}</ul>`;
                }
                ul.appendChild(li);
            }
        }

        function renderExamRules() {
            const ul = document.getElementById('finalExamRulesList');
            EXAM_RULES.forEach((rule, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${examRangePhrase(rule, i)}:</strong> ${examDeltaPhrase(rule.delta)}`;
                ul.appendChild(li);
            });
        }

        // ---- Main update loop --------------------------------------------

        function calculateGrade() {
            const core      = parseInt(document.getElementById('coreTargets').value, 10) || 0;
            const other     = parseInt(document.getElementById('otherTargets').value, 10) || 0;
            const finalExam = parseInt(document.getElementById('finalExam').value, 10) || 0;

            document.getElementById('coreValue').textContent  = core;
            document.getElementById('otherValue').textContent = other;
            document.getElementById('finalValue').textContent = finalExam + '%';

            const baseGrade  = calculateStandardsGrade(core, other);
            const adjustment = examAdjustment(finalExam);
            const finalGrade = adjustGrade(baseGrade, adjustment);

            const resultDiv = document.getElementById('result');
            resultDiv.className = `result grade-${finalGrade}`;
            resultDiv.textContent = `Your Final Grade: ${finalGrade}`;

            document.getElementById('gradeBreakdown').style.display = 'block';
            document.getElementById('initialGradeText').textContent =
                `Standards-based grade: ${baseGrade} (${core} CORE + ${other} OTHER)`;

            const n = Math.abs(adjustment);
            const grades = `${n} letter grade${n > 1 ? 's' : ''}`;
            let impactText = `Final exam: ${finalExam}% - `;
            if (adjustment > 0) {
                impactText += `Grade improved from ${baseGrade} to ${finalGrade}! (+${grades})`;
            } else if (adjustment < 0) {
                impactText += `Grade lowered from ${baseGrade} to ${finalGrade} (-${grades})`;
            } else {
                impactText += `Grade remained ${finalGrade} (no change)`;
            }
            document.getElementById('finalExamImpact').textContent = impactText;
        }

        // ---- Init --------------------------------------------------------

        createHashmarks('coreTargets', 'coreHashmarks');
        createHashmarks('otherTargets', 'otherHashmarks');
        createHashmarks('finalExam', 'finalHashmarks',
            [0, 40, 50, 60, 70, 80, 90, 100].map(v => ({ value: v, label: `${v}%` })));
        renderGradingScale();
        renderExamRules();
        calculateGrade();

        // ---- Dark-mode toggle --------------------------------------------
        // The initial theme is already set on <html> by the inline head
        // script; here we just reflect it on the button and let clicks flip it.

        const themeToggle = document.getElementById('themeToggle');

        function syncThemeButton() {
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            themeToggle.textContent = dark ? '☀️' : '🌙';
            themeToggle.setAttribute('aria-pressed', String(dark));
            themeToggle.setAttribute('title', dark ? 'Switch to light mode' : 'Switch to dark mode');
        }

        themeToggle.addEventListener('click', () => {
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            const next = dark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            try { localStorage.setItem('theme', next); } catch (e) {}
            syncThemeButton();
        });

        syncThemeButton();
    </script>
</body>
</html>
